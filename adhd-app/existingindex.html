document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n:relative;width:148px;height:148px;border-radius:50%;background:#F2917F;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 16px 40px rgba(242,145,127,.45);animation:df-breathe 3.2s ease-in-out infinite\">\n            <svg width=\"52\" height=\"52\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FFFFFF\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"9\" y=\"2\" width=\"6\" height=\"12\" rx=\"3\"><\u002Frect><path d=\"M5 10a7 7 0 0 0 14 0\"><\u002Fpath><line x1=\"12\" y1=\"19\" x2=\"12\" y2=\"22\"><\u002Fline><\u002Fsvg>\n          <\u002Fbutton>\n          <div style=\"text-align:center\">\n            <div style=\"font-size:18px;font-weight:800;color:#2E3547\">Tell me what's on your plate<\u002Fdiv>\n            <div style=\"font-size:13.5px;color:#9BA0A8;margin-top:6px;line-height:1.5\">Speak naturally — I'll break it into steps<br>and find time in your working hours.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:0 28px 118px;display:flex;justify-content:center\">\n          <button onclick=\"{{ openTypeSheet }}\" style=\"background:none;border:none;cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:700;color:#9BA0A8;display:flex;align-items:center;gap:7px;padding:10px 14px\">\n            <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#9BA0A8\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 20h9\"><\u002Fpath><path d=\"M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z\"><\u002Fpath><\u002Fsvg>\n            Too noisy? Type it instead\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= HOME: LISTENING ================= -->\n    <sc-if value=\"{{ hvListening }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Voice Listening\" style=\"position:absolute;inset:0;display:flex;flex-direction:column;background:#F7F5F1\">\n        <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;padding:0 32px\">\n          <button onclick=\"{{ stopListening }}\" style=\"position:relative;width:148px;height:148px;border-radius:50%;background:#F2917F;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none\">\n            <sc-if value=\"{{ showRings }}\" hint-placeholder-val=\"{{ true }}\">\n              <span style=\"position:absolute;inset:0;border-radius:50%;border:2px solid #F2917F;animation:df-pulse 1.6s ease-out infinite\"><\u002Fspan>\n              <span style=\"position:absolute;inset:0;border-radius:50%;border:2px solid #F2917F;animation:df-pulse 1.6s ease-out .55s infinite\"><\u002Fspan>\n            <\u002Fsc-if>\n            <svg width=\"52\" height=\"52\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FFFFFF\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"9\" y=\"2\" width=\"6\" height=\"12\" rx=\"3\"><\u002Frect><path d=\"M5 10a7 7 0 0 0 14 0\"><\u002Fpath><line x1=\"12\" y1=\"19\" x2=\"12\" y2=\"22\"><\u002Fline><\u002Fsvg>\n          <\u002Fbutton>\n          <div style=\"font-size:15px;font-weight:800;color:#F2917F;letter-spacing:.02em;animation:df-blink 1.4s ease-in-out infinite\">{{ listenStatus }}<\u002Fdiv>\n          <div style=\"min-height:96px;text-align:center;font-size:19px;font-weight:700;color:#2E3547;line-height:1.55;max-width:320px\">{{ liveTranscript }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:0 28px 118px;display:flex;justify-content:center\">\n          <sc-if value=\"{{ showRings }}\" hint-placeholder-val=\"{{ true }}\">\n            <button onclick=\"{{ stopListening }}\" style=\"background:#FFFFFF;border:1px solid #ECE8E2;border-radius:99px;cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:700;color:#2E3547;padding:12px 22px\">Done talking<\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= HOME: BREAKDOWN RESULT ================= -->\n    <sc-if value=\"{{ hvBreakdown }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Task Breakdown\" style=\"position:absolute;inset:0;display:flex;flex-direction:column;background:#F7F5F1;overflow-y:auto\">\n        <div style=\"padding:72px 24px 130px;display:flex;flex-direction:column;gap:16px;animation:df-up .35s ease-out\">\n          <div style=\"font-size:22px;font-weight:800;color:#2E3547\">Here's your plan<\u002Fdiv>\n          <div style=\"background:#FFFFFF;border:1px solid #ECE8E2;border-radius:16px;padding:14px 16px;display:flex;gap:10px;align-items:flex-start\">\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#9BA0A8\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;margin-top:2px\"><rect x=\"9\" y=\"2\" width=\"6\" height=\"12\" rx=\"3\"><\u002Frect><path d=\"M5 10a7 7 0 0 0 14 0\"><\u002Fpath><line x1=\"12\" y1=\"19\" x2=\"12\" y2=\"22\"><\u002Fline><\u002Fsvg>\n            <span style=\"font-size:13.5px;color:#9BA0A8;line-height:1.5;font-style:italic\">\"{{ pTranscript }}\"<\u002Fspan>\n          <\u002Fdiv>\n\n          <div style=\"background:#FFFFFF;border:1px solid #ECE8E2;border-radius:20px;padding:20px;display:flex;flex-direction:column;gap:16px\">\n            <div style=\"display:flex;align-items:center;gap:14px\">\n              <div style=\"width:46px;height:46px;border-radius:14px;background:#FDEEEA;display:flex;align-items:center;justify-content:center;flex:none;font-size:22px\">{{ pEmoji }}<\u002Fdiv>\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"font-size:17px;font-weight:800;color:#2E3547\">{{ pTitle }}<\u002Fdiv>\n                <div style=\"font-size:12.5px;font-weight:600;color:#9BA0A8;margin-top:2px\">Estimated {{ pEstimate }} · due {{ pDeadline }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:0\">\n              <sc-for list=\"{{ pSubs }}\" as=\"s\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;gap:12px;align-items:flex-start;position:relative;padding-bottom:16px\">\n                  <sc-if value=\"{{ s.notLast }}\" hint-placeholder-val=\"{{ true }}\">\n                    <div style=\"position:absolute;left:11px;top:24px;bottom:-2px;border-left:2px dashed #E4E0D9\"><\u002Fdiv>\n                  <\u002Fsc-if>\n                  <div style=\"width:24px;height:24px;border-radius:50%;background:#FFFFFF;border:2px solid #F2917F;color:#F2917F;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex:none;box-sizing:border-box;position:relative\">{{ s.n }}<\u002Fdiv>\n                  <div style=\"flex:1;min-width:0;padding-top:2px\">\n                    <span style=\"font-size:14.5px;font-weight:700;color:#2E3547\">{{ s.t }}<\u002Fspan>\n                    <span style=\"font-size:12.5px;font-weight:600;color:#9BA0A8;margin-left:8px\">{{ s.d }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"background:#FDEEEA;border-radius:14px;padding:13px 15px;display:flex;gap:11px;align-items:center\">\n              <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#F2917F\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"3\"><\u002Frect><line x1=\"16\" y1=\"2\" x2=\"16\" y2=\"6\"><\u002Fline><line x1=\"8\" y1=\"2\" x2=\"8\" y2=\"6\"><\u002Fline><line x1=\"3\" y1=\"10\" x2=\"21\" y2=\"10\"><\u002Fline><\u002Fsvg>\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"font-size:14px;font-weight:800;color:#2E3547\">{{ pSlotLabel }}<\u002Fdiv>\n                <div style=\"font-size:12px;font-weight:600;color:#9BA0A8;margin-top:1px\">Earliest free slot in your working hours ({{ workRangeLabel }})<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <button onclick=\"{{ confirmPending }}\" style=\"border:none;background:#F2917F;color:#FFFFFF;border-radius:16px;padding:16px;font-size:15.5px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 8px 20px rgba(242,145,127,.35)\">Add to schedule<\u002Fbutton>\n          <div style=\"display:flex;gap:10px\">\n            <button onclick=\"{{ adjustPending }}\" style=\"flex:1;border:1px solid #ECE8E2;background:#FFFFFF;color:#2E3547;border-radius:14px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit\">Adjust time<\u002Fbutton>\n            <button onclick=\"{{ discardPending }}\" style=\"flex:1;border:none;background:none;color:#9BA0A8;border-radius:14px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit\">Start over<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= HOME: SCHEDULE (timeline) ================= -->\n    <sc-if value=\"{{ hvSchedule }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Schedule\" style=\"position:absolute;inset:0;display:flex;flex-direction:column\">\n        <div style=\"background:#F7F5F1;padding:64px 8px 4px;border-bottom:1px solid #ECE8E2\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:0 12px 8px\">\n            <sc-if value=\"{{ showBackToVoice }}\" hint-placeholder-val=\"{{ false }}\">\n              <button onclick=\"{{ backToVoice }}\" style=\"background:none;border:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;padding:0;font-size:12px;font-weight:700;color:#F2917F\">\n                <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#F2917F\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"15 18 9 12 15 6\"><\u002Fpolyline><\u002Fsvg>\n                Voice\n              <\u002Fbutton>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ isTasks }}\" hint-placeholder-val=\"{{ false }}\">\n              <span style=\"font-size:15px;font-weight:800;color:#2E3547\">Tasks<\u002Fspan>\n            <\u002Fsc-if>\n            <span style=\"font-size:15px;font-weight:800;color:#2E3547\">{{ monthLabel }}<\u002Fspan>\n            <span style=\"font-size:12px;font-weight:600;color:#9BA0A8\">{{ selRelLabel }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex\">\n            <sc-for list=\"{{ days }}\" as=\"d\" hint-placeholder-count=\"7\">\n              <button onclick=\"{{ d.onClick }}\" style=\"flex:1;background:none;border:none;padding:2px 0 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;font-family:inherit\">\n                <span style=\"font-size:11.5px;font-weight:600;color:{{ d.nameColor }}\">{{ d.name }}<\u002Fspan>\n                <span style=\"width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;background:{{ d.bg }};color:{{ d.fg }};transition:background .18s\">{{ d.num }}<\u002Fspan>\n                <span style=\"width:5px;height:5px;border-radius:50%;background:{{ d.dot }}\"><\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"flex:1;overflow-y:auto;padding:26px 0 120px\">\n          <sc-for list=\"{{ nodes }}\" as=\"n\" hint-placeholder-count=\"4\">\n            <div style=\"display:grid;grid-template-columns:64px 56px 1fr 52px;position:relative;min-height:104px\">\n              <div style=\"font-size:12px;color:#9BA0A8;font-weight:600;padding-top:15px;text-align:right;padding-right:8px\">{{ n.timeShort }}<\u002Fdiv>\n\n              <div style=\"position:relative;display:flex;justify-content:center\">\n                <sc-if value=\"{{ n.notLast }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"position:absolute;left:50%;top:6px;bottom:-6px;border-left:2px dashed #E4E0D9;transform:translateX(-1px)\"><\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ n.isWake }}\" hint-placeholder-val=\"{{ false }}\">\n                  <button onclick=\"{{ n.onTap }}\" style=\"position:relative;width:44px;height:44px;border-radius:50%;background:#F2917F;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none;font-size:20px\">{{ n.emoji }}<\u002Fbutton>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ n.isSleep }}\" hint-placeholder-val=\"{{ false }}\">\n                  <button onclick=\"{{ n.onTap }}\" style=\"position:relative;width:44px;height:44px;border-radius:50%;background:#ECE8E2;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none;font-size:20px\">{{ n.emoji }}<\u002Fbutton>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ n.isPill }}\" hint-placeholder-val=\"{{ false }}\">\n                  <button onclick=\"{{ n.onTap }}\" style=\"position:relative;width:44px;height:{{ n.pillH }};border-radius:22px;background:#F2917F;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none;font-size:18px\">{{ n.emoji }}<\u002Fbutton>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ n.isDot }}\" hint-placeholder-val=\"{{ false }}\">\n                  <button onclick=\"{{ n.onTap }}\" style=\"position:relative;width:44px;height:44px;border-radius:50%;background:#FFFFFF;border:2px solid #F2917F;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none;font-size:20px\">{{ n.emoji }}<\u002Fbutton>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n\n              <div style=\"padding:8px 4px 0 12px;min-width:0;cursor:pointer\" onclick=\"{{ n.onTap }}\">\n                <div style=\"background:{{ n.hlBg }};border-radius:12px;padding:{{ n.hlPad }};display:inline-block;max-width:100%;box-sizing:border-box\">\n                  <div style=\"font-size:12.5px;color:#9BA0A8;font-weight:500\">{{ n.timeLabel }}<\u002Fdiv>\n                  <div style=\"font-size:16.5px;font-weight:700;color:{{ n.titleColor }};text-decoration:{{ n.deco }};margin-top:2px\">{{ n.title }}<\u002Fdiv>\n                  <sc-if value=\"{{ n.stepsLabel }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"margin-top:5px;display:inline-flex;align-items:center;gap:5px;background:#FDEEEA;border-radius:99px;padding:3px 9px;font-size:11px;font-weight:800;color:#F2917F\">{{ n.stepsLabel }}<\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n                <sc-if value=\"{{ n.gapLabel }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"margin-top:28px;font-size:13px;color:#9BA0A8;display:flex;align-items:center;gap:6px\">\n                    <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#9BA0A8\" stroke-width=\"2\" stroke-linecap=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7v5l3 2\"><\u002Fpath><\u002Fsvg>\n                    <span>Free for <span style=\"color:#F2917F;font-weight:700\">{{ n.gapLabel }}<\u002Fspan><\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n\n              <div style=\"padding-top:10px;display:flex;justify-content:center;align-items:flex-start\">\n                <sc-if value=\"{{ n.isEvent }}\" hint-placeholder-val=\"{{ false }}\">\n                  <button onclick=\"{{ n.onToggle }}\" style=\"width:26px;height:26px;border-radius:50%;cursor:pointer;background:{{ n.checkBg }};border:2px solid #F2917F;display:flex;align-items:center;justify-content      { id: 'e1', title: 'Deep work block', start: '09:30', end: '11:30', done: false, emoji: '💼' },\n      { id: 'e2', title: 'Meet with founder AJ', start: '17:00', end: '18:00', done: true, emoji: '👥' }\n    ];\n    seed[this.fmt(this.addDays(new Date(), 1))] = [\n      { id: 'e3', title: 'Dentist appointment', start: '15:00', end: null, done: false, emoji: '🦷' }\n    ];\n    seed[this.fmt(this.addDays(new Date(), 2))] = [\n      { id: 'e4', title: 'Team standup', start: '10:00', end: '10:30', done: false, emoji: '🤝' }\n    ];\n    const now = new Date();\n    this.state = {\n      tab: 'home',\n      homeView: 'voice',\n      sel: today,\n      calY: now.getFullYear(),\n      calM: now.getMonth(),\n      events: (saved && saved.events) || (oldSaved && oldSaved.events) || seed,\n      workStart: (saved && saved.workStart) || '09:00',\n      workEnd: (saved && saved.workEnd) || '18:00',\n      modal: null,\n      emojiPickerOpen: false,\n      typeSheetOpen: false,\n      typeText: '',\n      transcript: '',\n      tWords: 0,\n      listenPhase: 'listen',\n      pending: null,\n      lastAdded: null\n    };\n    this.timers = [];\n  }\n\n  componentWillUnmount() { this.timers.forEach(clearTimeout); if (this.wordTimer) clearInterval(this.wordTimer); }\n  later(fn, ms) { this.timers.push(setTimeout(fn, ms)); }\n\n  fmt(d) {\n    const p = (n) => String(n).padStart(2, '0');\n    return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());\n  }\n  addDays(d, n) { const c = new Date(d); c.setDate(c.getDate() + n); return c; }\n  toDate(iso) { const [y, m, d] = iso.split('-').map(Number); return new Date(y, m - 1, d); }\n  toMin(t) { if (!t) return null; const [h, m] = t.split(':').map(Number); return h * 60 + m; }\n  minToT(mn) { return String(Math.floor(mn / 60)).padStart(2, '0') + ':' + String(mn % 60).padStart(2, '0'); }\n  fmtT(t) {\n    if (!t) return '';\n    const [h, m] = t.split(':').map(Number);\n    if ((this.props.timeFormat || '12h') === '24h') return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');\n    const ap = h >= 12 ? 'PM' : 'AM';\n    const hh = h % 12 || 12;\n    return hh + ':' + String(m).padStart(2, '0') + ' ' + ap;\n  }\n  durLabel(mins) {\n    const h = Math.floor(mins / 60), m = mins % 60;\n    if (h && m) return h + 'h ' + m + 'm';\n    if (h) return h + 'h';\n    return m + 'm';\n  }\n  relLabel(iso) {\n    const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];\n    const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];\n    const d = this.toDate(iso);\n    const diff = Math.round((d - this.toDate(this.fmt(new Date()))) / 86400000);\n    if (diff === 0) return 'Today';\n    if (diff === 1) return 'Tomorrow';\n    return dayNames[d.getDay()] + ', ' + monthNames[d.getMonth()] + ' ' + d.getDate();\n  }\n\n  persist() {\n    try {\n      localStorage.setItem('dailyflow-v2', JSON.stringify({ events: this.state.events, workStart: this.state.workStart, workEnd: this.state.workEnd }));\n    } catch (e) {}\n  }\n\n  setEvents(fn) { this.setState((s) => ({ events: fn(s.events) }), () => this.persist()); }\n\n  toggleDone(date, id) {\n    this.setEvents((ev) => {\n      const copy = Object.assign({}, ev);\n      copy[date] = (copy[date] || []).map((e) => e.id === id ? Object.assign({}, e, { done: !e.done }) : e);\n      return copy;\n    });\n  }\n\n  // ---------- Voice flow ----------\n  startListening() {\n    const SAMPLE = 'I need to finish my quarterly report by Friday, it\\u2019s probably a couple of hours of work';\n    const words = SAMPLE.split(' ');\n    this.setState({ homeView: 'listening', transcript: SAMPLE, tWords: 0, listenPhase: 'listen' });\n    if (this.wordTimer) clearInterval(this.wordTimer);\n    this.wordTimer = setInterval(() => {\n      this.setState((s) => {\n        if (s.tWords >= words.length) {\n          clearInterval(this.wordTimer);\n          this.later(() => this.stopListening(), 600);\n          return {};\n        }\n        return { tWords: s.tWords + 1 };\n      });\n    }, 170);\n  }\n\n  stopListening() {\n    if (this.state.listenPhase === 'think') return;\n    if (this.wordTimer) clearInterval(this.wordTimer);\n    this.setState({ listenPhase: 'think', tWords: this.state.transcript.split(' ').length });\n    this.later(() => this.generateBreakdown(this.state.transcript), 1300);\n  }\n\n  // Hardcoded stand-in for the future LLM call: transcript in -> structured task out\n  generateBreakdown(transcript) {\n    const LLM_RESULT = {\n      title: 'Finish quarterly report',\n      emoji: '📝',\n      estimateMin: 90,\n      deadline: 'Friday',\n      subs: [\n        { t: 'Outline key sections', d: '20m' },\n        { t: 'Draft the content', d: '45m' },\n        { t: 'Proofread & send', d: '25m' }\n      ]\n    };\n    const slot = this.findSlot(LLM_RESULT.estimateMin);\n    this.setState({\n      homeView: 'breakdown',\n      pending: Object.assign({}, LLM_RESULT, { transcript, date: slot.date, start: slot.start, end: this.minToT(this.toMin(slot.start) + LLM_RESULT.estimateMin) })\n    });\n  }\n\n  // First free gap inside working hours, scanning from today forward\n  findSlot(durMin) {\n    const ws = this.toMin(this.state.workStart), we = this.toMin(this.state.workEnd);\n    for (let d = 0; d < 14; d++) {\n      const date = this.fmt(this.addDays(new Date(), d));\n      let cursor = ws;\n      if (d === 0) {\n        const now = new Date();\n        const nowM = now.getHours() * 60 + now.getMinutes() + 15;\n        cursor = Math.max(ws, Math.ceil(nowM / 15) * 15);\n      }\n      const evs = (this.state.events[date] || []).slice().sort((a, b) => this.toMin(a.start) - this.toMin(b.start));\n      let placed = null;\n      for (const ev of evs) {\n        const s = this.toMin(ev.start);\n        if (s - cursor >= durMin) { placed = cursor; break; }\n        cursor = Math.max(cursor, this.toMin(ev.end) || (s + 30));\n      }\n      if (placed === null && cursor + durMin <= we) placed = cursor;\n      if (placed !== null && placed + durMin <= we) return { date, start: this.minToT(placed) };\n    }\n    return { date: this.fmt(new Date()), start: this.state.workStart };\n  }\n\n  confirmPending() {\n    const p = this.state.pending;\n    if (!p) return;\n    const id = 'e' + Date.now();\n    this.setEvents((ev) => {\n      const copy = Object.assign({}, ev);\n      copy[p.date] = (copy[p.date] || []).concat([{ id, title: p.title, start: p.start, end: p.end, done: false, emoji: p.emoji, subs: p.subs.map((s) => s.t + ' (' + s.d + ')') }]);\n      return copy;\n    });\n    this.setState({ homeView: 'schedule', sel: p.date, pending: null, lastAdded: id });\n  }\n\n  openModal(modal) { this.setState({ modal }); }\n\n  saveModal() {\n    const m = this.state.modal;\n    if (!m || !m.title.trim() || !m.start || !m.date) return;\n    this.setEvents((ev) => {\n      const copy = Object.assign({}, ev);\n      let done = false, subs = m.subs || null;\n      if (m.id) {\n        const prev = (copy[m.origDate] || []).find((e) => e.id === m.id);\n        if (prev) { done = prev.done; subs = prev.subs || subs; }\n        copy[m.origDate] = (copy[m.origDate] || []).filter((e) => e.id !== m.id);\n      }\n      const id = m.id || 'e' + Date.now();\n      let end = m.end || null;\n      if (end && this.toMin(end) <= this.toMin(m.start)) end = null;\n      const rec = { id, title: m.title.trim(), start: m.start, end, done, emoji: m.emoji || '😀' };\n      if (subs) rec.subs = subs;\n      copy[m.date] = (copy[m.date] || []).concat([rec]);\n      return copy;\n    });\n    const next = { modal: null, sel: m.date };\n    if (this.state.tab === 'home') next.homeView = 'schedule';\n    if (m.fromPending) { next.pending = null; next.lastAdded = m.id || null; }\n    this.setState(next);\n  }\n\n  deleteModal() {\n    const m = this.state.modal;\n    if (!m || !m.id) return;\n    this.setEvents((ev) => {\n      const copy = Object.assign({}, ev);\n      copy[m.origDate] = (copy[m.origDate] || []).filter((e) => e.id !== m.id);\n      return copy;\n    });\n    this.setState({ modal: null });\n  }\n\n  buildNodes() {\n    const A = '#F2917F', DARK = '#2E3547', MUTED = '#9BA0A8';\n    const { sel, events, workStart, workEnd, lastAdded } = this.state;\n    const evs = (events[sel] || []).slice().sort((a, b) => this.toMin(a.start) - this.toMin(b.start));\n    const items = [{ kind: 'wake', start: workStart, end: null, title: 'Work starts', emoji: '🕘' }]\n      .concat(evs.map((e) => Object.assign({ kind: 'event' }, e)))\n      .concat([{ kind: 'sleep', start: workEnd, end: null, title: 'Work ends', emoji: '🏁' }]);\n    const showGaps = this.props.showFreeGaps !== false;\n    return items.map((it, i) => {\n      const last = i === items.length - 1;\n      const next = items[i + 1];\n      let gapLabel = false;\n      if (showGaps && next) {\n        const gap = this.toMin(next.start) - this.toMin(it.end || it.start);\n        if (gap >= 60) gapLabel = this.durLabel(gap);\n      }\n      const dur = it.end ? this.toMin(it.end) - this.toMin(it.start) : 0;\n      const isEvent = it.kind === 'event';\n      const isNew = isEvent && it.id === lastAdded;\n      let timeLabel = this.fmtT(it.start);\n      if (it.end) timeLabel += ' – ' + this.fmtT(it.end) + ' (' + this.durLabel(dur) + ')';\n      return {\n        id: it.id || it.kind,\n        emoji: it.emoji,\n        isWake: it.kind === 'wake',\n        isSleep: it.kind === 'sleep',\n        isPill: isEvent && !!it.end,\n        isDot: isEvent && !it.end,\n        isEvent,\n        notLast: !last,\n        timeShort: this.fmtT(it.start),\n        timeLabel,\n        title: it.title,\n        titleColor: isEvent && it.done ? MUTED : DARK,\n        deco: isEvent && it.done ? 'line-through' : 'none',\n        done: !!it.done,\n        checkBg: it.done ? A : '#FFFFFF',\n        pillH: Math.min(120, Math.max(66, dur * 0.7)) + 'px',\n        hlBg: isNew ? '#FDEEEA' : 'transparent',\n        hlPad: isNew ? '8px 12px' : '0',\n        stepsLabel: (it.subs && it.subs.length) ? it.subs.length + ' steps' : false,\n        gapLabel,\n        onToggle: (e) => { e.stopPropagation(); this.toggleDone(this.state.sel, it.id); },\n        onTap: () => {\n          if (isEvent) this.openModal({ id: it.id, origDate: this.state.sel, title: it.title, date: this.state.sel, start: it.start, end: it.end || '', emoji: it.emoji });\n          else this.setState({ tab: 'settings' });\n        }\n      };\n    });\n  }\n\n  renderVals() {\n    const A = '#F2917F', DARK = '#2E3547', MUTED = '#9BA0A8', LIGHT = '#ECE8E2';\n    const { tab, homeView, sel, events, calY, calM, modal, workStart, workEnd, emojiPickerOpen, typeSheetOpen, typeText, transcript, tWords, listenPhase, pending } = this.state;\n    const todayIso = this.fmt(new Date());\n    const selDate = this.toDate(sel);\n    const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];\n    const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];\n\n    const days = [];\n    for (let i = -3; i <= 3; i++) {\n      const d = this.addDays(selDate, i);\n      const iso = this.fmt(d);\n      const isSel = iso === sel, isToday = iso === todayIso;\n      days.push({\n        name: dayNames[d.getDay()],\n        nameColor: isSel ? DARK : MUTED,\n        num: d.getDate(),\n        bg: isSel ? A : (isToday ? LIGHT : 'transparent'),\n        fg: isSel ? '#FFFFFF' : DARK,\n        dot: (events[iso] || []).length ? A : 'transparent',\n        onClick: () => this.setState({ sel: iso })\n      });\n    }\n\n    const first = new Date(calY, calM, 1);\n    const startOffset = first.getDay();\n    const dim = new Date(calY, calM + 1, 0).getDate();\n    const calCells = [];\n    const totalCells = Math.ceil((startOffset + dim) / 7) * 7;\n    for (let i = 0; i < totalCells; i++) {\n      const d = new Date(calY, calM, i - startOffset + 1);\n      const iso = this.fmt(d);\n      const inMonth = d.getMonth() === calM;\n      const isSel = iso === sel, isToday = iso === todayIso;\n      calCells.push({\n        num: d.getDate(),\n        bg: isSel ? A : (isToday ? LIGHT : 'transparent'),\n        fg: isSel ? '#FFFFFF' : (inMonth ? DARK : '#C9CCD1'),\n        dot: (events[iso] || []).length ? (isSel ? DARK : A) : 'transparent',\n        onClick: () => this.setState({ sel: iso, calY: d.getFullYear(), calM: d.getMonth() })\n      });\n    }\n\n    const selEvs = (events[sel] || []).slice().sort((a, b) => this.toMin(a.start) - this.toMin(b.start));\n    const selEvents = selEvs.map((e) => ({\n      emoji: e.emoji || '😀',\n      title: e.title,\n      titleColor: e.done ? MUTED : DARK,\n      deco: e.done ? 'line-through' : 'none',\n      timeLabel: this.fmtT(e.start) + (e.end ? ' – ' + this.fmtT(e.end) : ''),\n      done: !!e.done,\n      checkBg: e.done ? A : '#FFFFFF',\n      onToggle: () => this.toggleDone(sel, e.id),\n      onEdit: () => this.openModal({ id: e.id, origDate: sel, title: e.title, date: sel, start: e.start, end: e.end || '', emoji: e.emoji || '😀' })\n    }));\n\n    const m = modal || {};\n    const canSave = !!(m.title && m.title.trim() && m.start && m.date);\n    const emojiList = ['😀', '😍', '😂', '🎉', '💼', '👥', '🧠', '💡', '📚', '🎓', '🏃', '⚽', '🍕', '☕', '🎵', '🎬', '🦷', '🏥', '🚗', '✈️', '🏠', '🎯', '🤝', '⭐'];\n    const goTab = (t) => () => {\n      if (t === 'calendar') {\n        const d = this.toDate(this.state.sel);\n        this.setState({ tab: t, calY: d.getFullYear(), calM: d.getMonth() });\n      } else this.setState({ tab: t });\n    };\n\n    const hour = new Date().getHours();\n    const greeting = hour < 12 ? 'Good morning' : (hour < 18 ? 'Good afternoon' : 'Good evening');\n    const todayCount = (events[todayIso] || []).length;\n    const p = pending || {};\n\n    return {\n      hvIdle: tab === 'home' && homeView === 'voice',\n      hvListening: tab === 'home
